name: Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 01:00 UTC
    - cron: '0 1 * * *'

jobs:
  audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --json > npm-audit-report.json || true
        continue-on-error: true

      - name: Parse audit results
        run: |
          if [ -f npm-audit-report.json ]; then
            echo "=== NPM Audit Report ===" 
            cat npm-audit-report.json | grep -E '"vulnerabilities"|"severity"|"critical"|"high"' || echo "No critical vulnerabilities found"
          fi

      - name: Upload audit results
        uses: actions/upload-artifact@v3
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 90

      - name: Check for known vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: OWASP Dependency-Check (optional)
        uses: jeremylong/DependencyCheck_Action@main
        with:
          project: 'Registre-Securite'
          path: '.'
          format: 'JSON'
          args: >
            --enableExperimental
        continue-on-error: true

      - name: Comment on PR with security findings
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '🔒 **Security Audit Results**\n\n';
            
            try {
              const auditData = JSON.parse(fs.readFileSync('npm-audit-report.json', 'utf8'));
              const vulnerabilities = auditData.metadata?.vulnerabilities || {};
              
              if (vulnerabilities.total === 0) {
                comment += '✅ No vulnerabilities detected!\n';
              } else {
                comment += `⚠️ Found ${vulnerabilities.total} vulnerabilities:\n`;
                comment += `- Critical: ${vulnerabilities.critical || 0}\n`;
                comment += `- High: ${vulnerabilities.high || 0}\n`;
                comment += `- Medium: ${vulnerabilities.moderate || 0}\n`;
                comment += `- Low: ${vulnerabilities.low || 0}\n`;
              }
            } catch (e) {
              comment += '⚠️ Could not parse audit results\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })
        continue-on-error: true
